name: CI

# Runs the backend (pytest) and frontend (Playwright) test suites on every
# push to main/master. This is a basic test-run gate — no lint, formatting,
# or code-quality/security scanning is included yet (added in a later phase).
on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (FastAPI + Engine)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.1"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        # Installs lawyergpt-server's deps + the editable lawyergpt-engine
        # path-dependency declared in pyproject.toml ([tool.uv.sources]).
        # No OPENAI_API_KEY is required — the test suite exercises the real
        # HTTP/DB layer and falls back to a clean error event for the one
        # test that calls the generation pipeline, so it runs fully offline.
        working-directory: lawyergpt-server
        run: uv sync --extra dev

      - name: Run backend test suite
        working-directory: lawyergpt-server
        run: uv run pytest tests/ -v --tb=short

  frontend-tests:
    name: Frontend Tests (React + Playwright)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lawyergpt-client/package-lock.json

      - name: Install frontend dependencies
        working-directory: lawyergpt-client
        run: npm ci

      - name: Type-check and build
        # Sanity check that the production bundle compiles (tsc + vite build).
        working-directory: lawyergpt-client
        run: npm run build

      - name: Install Playwright browsers
        working-directory: lawyergpt-client
        run: npx playwright install --with-deps chromium

      - name: Run Playwright test suite
        working-directory: lawyergpt-client
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: lawyergpt-client/playwright-report/
          retention-days: 7
