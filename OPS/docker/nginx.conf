# nginx configuration for LawyerGPT frontend (SPA + hardened headers)
# Runs on port 8080 so the container can run as a non-root user.

server {
    listen      8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header X-Frame-Options           "DENY"                            always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8000 https:; img-src 'self' data:; font-src 'self' data:;"
        always;

    # ── Caching strategy ─────────────────────────────────────────────────────
    # Vite appends a content hash to every JS/CSS asset filename.
    # These files are immutable — safe to cache for 1 year.
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html must NOT be cached — it is the entry point the browser uses
    # to discover the correct hashed asset URLs.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Health probe (used by Docker HEALTHCHECK and load balancers) ──────────
    location /health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }

    # ── SPA fallback — all routes serve index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Deny hidden files (.env, .git, etc.) ──────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
